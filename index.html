<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snitap</title>
    <link rel="stylesheet" href="styles/index.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,500;1,14..32,500&family=Montserrat:ital,wght@0,500;1,500&family=Syne:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav>
        <img src="assets/logo.svg" alt="logo do Snitap" />
        <div class="shop">
          <img
            src="assets/icons/shopping-bag.svg"
            alt="Icone de carrinho de compras"
          />
          <span>1</span>
        </div>
      </nav>
    </header>

    <section class="hero flex">
      <div class="container-h1">
        <h1>
          Snitap, sua vida mais
          <div class="animation">
            <span>radical</span>
            <span>divertida</span>
            <span>saudável</span>
            <span>radical</span>
          </div>
        </h1>
        <div class="buttons flex center">
          <a href="#" class="buy flex center">
            <img src="assets/icons/shopping-bag.svg" alt="">
            <span>COMPRAR AGORA</span>
          </a>
          <a href="#" class="play flex center">
            <span class="icon">
              <img src="assets/icons/play.svg" alt="">
            </span>
            <span>VEJA EM AÇÃO</span>
          </a>
        </div>
      </div>

      <div class="patins">
        <div class="content">
          <img src="assets/icons/ellipse.svg" alt="">
          <img src="assets/animation/patins.png" alt="">
          <img src="assets/animation/stars-1.svg" alt="">
          <img src="assets/animation/stars-2.svg" alt="">
        </div>
      </div>
    </section>

    <section class="banner">
      <div class="scroll">
        <div class="role flex">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
          <img src="assets/banner.svg" alt="">
        </div>
      </div>
    </section>

    <section class="gallery">
      <header>
        <span>GALERIA DE FOTOS</span>
        <h2>#usesnitap por aí</h2>
      </header>
      <div class="content grid">
        <figure>
          <img src="assets/images/01.png" alt="">
          <figcaption class="flex">
            <img src="assets/images/person.png" alt="">
            <span>@laviniapereira</span>
          </figcaption>
        </figure>

        <figure data-delay>
          <img src="assets/images/02.png" alt="">
          <figcaption class="flex">
            <img src="assets/images/person.png" alt="">
            <span>@laviniapereira</span>
          </figcaption>
        </figure>

        <figure>
          <img src="assets/images/03.png" alt="">
          <figcaption class="flex">
            <img src="assets/images/person.png" alt="">
            <span>@laviniapereira</span>
          </figcaption>
        </figure>

        <figure data-delay>
          <img src="assets/images/04.png" alt="">
          <figcaption class="flex">
            <img src="assets/images/person.png" alt="">
            <span>@laviniapereira</span>
          </figcaption>
        </figure>
      </div>
    </section>

    <footer>
      <div class="logo">
        <img src="assets/logo.svg" alt="">
        <span>Snitap</span>
      </div>

      <nav>
        <a href="#">Sobre</a>
        <a href="#">Nossas Lojas</a>
        <a href="#">Política de privacidade</a>
      </nav>

      <div class="link-socials">
        <a href="#" title="instagram">
          <img src="assets/icons/instagram.svg" alt="">
        </a>

        <a href="#" title="facebook">
          <img src="assets/icons/facebook.svg" alt="">
        </a>

        <a href="#" title="youtube">
          <img src="assets/icons/youtube.svg" alt="">
        </a>

        <a href="#" title="tiktok">
          <img src="assets/icons/tiktok.svg" alt="">
        </a>
      </div>
    </footer>
  </body>
</html>
